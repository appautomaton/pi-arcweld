<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="pi-arcweld mark">
  <!-- pi-arcweld: a pi whose crossbar is the weld bead, in titanium heat colors -->
  <style>
    :root { --plate: #edf0f4; --ink: #0f1621; --core: #1d5bd6; }
    @media (prefers-color-scheme: dark) {
      :root { --plate: #0a0f17; --ink: #e9eef6; --core: #edf5ff; }
    }
    .leg { fill: none; stroke: var(--ink); stroke-width: 4.2; stroke-linecap: round; }
    .ripple { fill: none; stroke: var(--plate); stroke-width: 4.6; stroke-linecap: round; stroke-dasharray: 0.5 2.4; opacity: 0.32; }
    .arcdot { fill: var(--core); }
  </style>
  <defs>
    <linearGradient id="heat" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f5c34d"/>
      <stop offset="0.3" stop-color="#e2894f"/>
      <stop offset="0.55" stop-color="#b76bd6"/>
      <stop offset="0.78" stop-color="#7b7df2"/>
      <stop offset="1" stop-color="#4b93f0"/>
    </linearGradient>
  </defs>
  <rect width="48" height="48" rx="10" fill="var(--plate)"/>
  <path class="leg" d="M17 19v16"/>
  <path class="leg" d="M31 19v12q0 4 4 4"/>
  <path d="M9.5 15.5h29" fill="none" stroke="url(#heat)" stroke-width="4.6" stroke-linecap="round"/>
  <path class="ripple" d="M9.5 15.5h29"/>
  <circle class="arcdot" cx="38.5" cy="15.5" r="2.6"/>
</svg>
